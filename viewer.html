<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Problem Radar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 20px; max-width: 900px; }
    h1 { font-size: 1.6rem; }
    .problem-card {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .meta { font-size: 0.8rem; color: #666; margin-bottom: 4px; }
    .problem { font-weight: 600; margin-bottom: 6px; }
    .examples { font-size: 0.9rem; color: #333; margin-left: 14px; }
    .badge { display: inline-block; font-size: 0.75rem; padding: 2px 6px; border-radius: 999px; background: #eef2ff; color: #3730a3; margin-right: 4px; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Problem Radar</h1>
  <p>Latest real problems people are talking about. Each card = one pain cluster.</p>

  <div id="problems"></div>

  <script>
    async function loadProblems() {
      try {
        const res = await fetch('problems.json');
        const data = await res.json();
        const container = document.getElementById('problems');
        container.innerHTML = '';

        data
          .sort((a, b) => (b.frequency_score || 0) - (a.frequency_score || 0))
          .forEach(p => {
            const div = document.createElement('div');
            div.className = 'problem-card';

            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.innerHTML = `
              <span class="badge">${p.source || 'unknown'}</span>
              <span class="badge">${p.subreddit ? 'r/' + p.subreddit : 'niche'}</span>
              <span>Freq: ${p.frequency_score ?? '?'}, Intensity: ${p.intensity_score ?? '?'}</span>
            `;
            div.appendChild(meta);

            const problem = document.createElement('div');
            problem.className = 'problem';
            problem.textContent = p.problem;
            div.appendChild(problem);

            if (p.who) {
              const who = document.createElement('div');
              who.style.fontSize = '0.85rem';
              who.style.color = '#555';
              who.textContent = 'Who: ' + p.who;
              div.appendChild(who);
            }

            if (p.examples && p.examples.length) {
              const ul = document.createElement('ul');
              ul.className = 'examples';
              p.examples.slice(0, 3).forEach(ex => {
                const li = document.createElement('li');
                li.textContent = ex;
                ul.appendChild(li);
              });
              div.appendChild(ul);
            }

            if (p.link) {
              const link = document.createElement('a');
              link.href = p.link;
              link.target = '_blank';
              link.rel = 'noopener noreferrer';
              link.textContent = 'View source';
              div.appendChild(link);
            }

            container.appendChild(div);
          });
      } catch (e) {
        console.error(e);
        document.getElementById('problems').textContent =
          'Failed to load problems.json. Add one to see results.';
      }
    }

    loadProblems();
  </script>
</body>
</html>
