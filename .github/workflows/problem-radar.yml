name: Update Problem Radar

on:
  schedule:
    - cron: "0 3 * * *"  # Every day at 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator script
        run: python generate_problems.py

      - name: Upload problems.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: problems
          path: problems.json
