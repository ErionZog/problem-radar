name: Update Problem Radar

on:
  schedule:
    - cron: "0 3 * * *"  # Every day at 21 :00 UTC
  workflow_dispatch:      # Allows you to run it manually with a button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator script
        run: python generate_problems.py

      - name: Commit updated problems.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add problems.json
          git diff-index --quiet HEAD || git commit -m "Update problems.json from agent"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
